name: Docker Publish

# Builds the canonical docling/OCR runtime (Dockerfile) and pushes it to
# GHCR on every version tag. This is the release path for the Docker image;
# see docker-smoke.yml for the recurring health check of the same image
# that runs independently of a release. PyPI publishing is deliberately
# out of scope here — see issue #176 and #181 (org move / package name).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          image="ghcr.io/${{ github.repository }}"
          {
            echo "image=$image"
            echo "ref=$ref"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.ref }}
            ${{ steps.meta.outputs.image }}:latest
