name: Spec question
description: A question or ambiguity in the OPF specification
labels: [spec]
body:
  - type: input
    id: section
    attributes:
      label: Spec section
      placeholder: e.g. §3.5.3 Negotiation dynamics
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question / ambiguity
      description: >
        What does the spec leave unclear? If two readings are possible,
        state both and what each would imply for a producer or consumer.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What are you building?
      description: Producer, consumer, validator, something else?
