# Clause taxonomy — CUAD-base (type-neutral starting point).
# Loadable as `taxonomy: builtin:cuad-base.yaml`.
#
# The GENUINE CUAD v1 category list: exactly 41 entries, nothing
# added — headings that merely resemble common contract sections
# (Indemnification, Confidentiality, Force Majeure, ...) are NOT
# CUAD categories and live in general-commercial.yaml instead, so
# CUAD provenance is never claimed falsely (2026-07 audit finding).
# This file is also the taxonomy inductor's reference list — the
# single source of truth (issue #167).
#
# All entries ship status: active; adopters prune by setting
# status: inactive per agreement type (never delete).
